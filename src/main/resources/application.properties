spring.application.name=taskflow-api

# Datasource: credenciales SIEMPRE por variable de entorno
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Flyway gestiona el esquema; Hibernate solo valida que coincida
spring.jpa.hibernate.ddl-auto=validate

# Anti-patrón OSIV desactivado: las queries viven solo dentro de la transacción
spring.jpa.open-in-view=false

spring.mvc.problemdetails.enabled=true

# En un futuro application-prod.properties:
#springdoc.api-docs.enabled=false
#springdoc.swagger-ui.enabled=false